plugins {
    id 'java'
    id 'application'
    id 'com.github.johnrengelman.shadow' version '8.1.1'
}

repositories {
    mavenCentral()
}

dependencies {
    implementation 'io.javalin:javalin:6.1.3'
    implementation 'org.slf4j:slf4j-simple:2.0.13'
    implementation 'com.fasterxml.jackson.core:jackson-databind:2.17.0'
    implementation 'com.fasterxml.jackson.core:jackson-core:2.17.0'
    implementation 'com.fasterxml.jackson.core:jackson-annotations:2.17.0'
    implementation 'org.mindrot:jbcrypt:0.4'
}

application {
    mainClass = 'com.typui.database.Main'
}

java {
    sourceCompatibility = JavaVersion.VERSION_17
    targetCompatibility = JavaVersion.VERSION_17
}

jar {
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    manifest {
        attributes 'Main-Class': 'com.typui.database.Main'
        attributes 'Implementation-Title': 'TYUES-data Database'
        attributes 'Implementation-Version': '3.4.2567.29'
        attributes 'Implementation-Vendor': 'TYUES Organization'
    }
    from {
        configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) }
    }
    exclude 'META-INF/*.RSA', 'META-INF/*.SF', 'META-INF/*.DSA'
}

shadowJar {
    archiveBaseName.set('typui-database')
    archiveClassifier.set('')
    archiveVersion.set('3.4.2567.29')
}

tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
}

run {
    jvmArgs = [
        '-server',
        '-Xms64m',
        '-Xmx256m',
        '-XX:+UseG1GC',
        '-XX:MaxGCPauseMillis=100',
        '-XX:+ParallelRefProcEnabled',
        '-Dfile.encoding=UTF-8'
    ]
}
